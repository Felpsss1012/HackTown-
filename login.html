<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hubly - login</title>

    <link rel="stylesheet" href="./styles/login.css">
    <script src="./scripts/login.js"></script>
</head>
<body>
  <div class="container">
    <!-- ENTRAR -->
    <form id="loginForm">
      <h2>Entrar</h2>
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
      <div class="links">
        <a onclick="showForm('forgotForm')">Esqueci a senha</a> | 
        <a onclick="showForm('registerForm')">Cadastrar-se</a>
      </div>
    </form>

    <!-- CADASTRO -->
    <form id="registerForm" class="hidden">
        <h2>Cadastrar-se</h2>
        <input type="text" placeholder="Nome completo" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Senha" required>
        <button type="submit">Registrar</button>
        <div class="links">
            <a onclick="showForm('loginForm')">Já tenho conta</a>
        </div>
        <p id="erro-esqueci" class="hidden" style="color: red; font-size: 14px;"></p>
    </form>

    <!-- ESQUECI A SENHA -->
    <form id="forgotForm" class="hidden">
        <h2>Recuperar senha</h2>
        <input id="esqueci-email" type="email" placeholder="Digite seu email" required>
        <button type="submit">Enviar link</button>
        <div class="links">
            <a onclick="showForm('loginForm')">Voltar ao login</a>
        </div>
        <p id="erro-esqueci" class="hidden" style="color: red; font-size: 14px;"></p>
    </form>
  </div>
</body>
</html>
